name: Auto-Login Checker

on:
  # Runs on schedule every 2 hours (UTC)
  schedule:
    - cron: '0 */2 * * *'
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  login-check:
    runs-on: ubuntu-latest

    steps:
      # 1) Grab your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3) Install dependencies
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4) Run the login‐checker script
      - name: Run auto-loginer
        env:
          AUTOLOGIN_USER: ${{ secrets.AUTOLOGIN_USER }}
          AUTOLOGIN_PASS: ${{ secrets.AUTOLOGIN_PASS }}
        run: |
          python login_checker.py

      # 5) (Optional) Upload log on failure for debugging
      - name: Upload log artifact
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: login-check-log
          path: login_checker.log
